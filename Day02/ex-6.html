        }
        nav ul li {
            display: inline;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>

        </a>

                <li><a href="#gioithieu">Giới thiệu</a></li>
                <li><a href="#sanpham">Sản phẩm</a></li>
                <li><a href="#dichvu">Dịch vụ</a></li>
                <li><a href="#lienhe">Liên hệ</a></li>
            </ul>
        </nav>
    </header>
    <section id="gioithieu">
        <article>
            <h2>Giới thiệu</h2>
            <p>Viện công nghệ....</p>
        </article>
    </section>
   <footer>
        <p>&copy; 2024 Viện công nghệ. All rights reserved.</p>
    </footer>
   
</body>
</html>
