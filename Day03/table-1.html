<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table cơ bản</title>
</head>
<body>
    <h1>Table cơ bản</h1>
    <table border="1" width="100%" cellpadding="5" cellspacing="1" >
        <thead>
            <tr>
                <th>Header 1</th>
                <th>Header 2</th>
                <th>Header 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dòng 1, cột 1</td>
                <td align="center">Dòng 1, cột 2</td>
                <td>Dòng 1, cột 3</td>
            </tr>
            <tr>
                <td>Dòng 2, cột 1</td>
                <td>Dòng 2, cột 2</td>
                <td align="right">Dòng 2, cột 3</td>  
            </tr>
        </tbody>
    </table>
</body>
</html>
