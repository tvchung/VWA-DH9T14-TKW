<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - các thuộc tính thường dùng</title>
</head>
<body>
    <h1>Table - các thuộc tính thường dùng</h1>
    <hr>
    <table border="1px" width="500px" cellpadding="5" cellspacing="0" align="center">
        <thead bgcolor="green" style="color: yellow;">
            <tr>
                <th rowspan="2">STT</th>
                <th rowspan="2">Họ và tên</th>
                <th colspan="3">Điểm</th>
            </tr>
            <tr>
                <th>Toán</th>
                <th>Lý</th>
                <th>Hóa</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td align="center">101</td>
                <td>Nguyễn Văn A</td>
                <td align="right">8.5</td>
                <td align="right">9.0</td>
                <td align="right">9.5</td>
            </tr>
            <tr>
                <td align="center">102</td>
                <td>Trần Thị B</td>
                <td align="right">9.0</td>
                <td align="right" bgcolor="red">10.0</td>
                <td align="right">9.5</td>
            </tr>
            <tr>
                <td align="center">103</td>
                <td>Phạm Văn C</td>
                <td align="right">7.5</td>
                <td align="right">8.0</td>
                <td align="right">8.5</td>
            </tr>
        </tbody>
        <tfoot bgcolor="orange" style="color: white;">
            <tr>
                <th align="right" colspan="2">Điểm trung bình:</th>
                <th align="right">8.3</th>
                <th align="right">9.0</th>
                <th align="right">9.2</th>
            </tr>
            <tr>
                <th colspan="5" align="center">Tổng số học sinh: 3</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
