<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .box{
            background-color: green;
            width: 350px;
            height: 250px;
            border: 10px solid red;
            margin: 1rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="box">
        Box Model
    </div>
</body>
</html>
