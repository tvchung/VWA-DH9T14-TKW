<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Định vị phần tử</title>
    <style>
        *{
            box-sizing: border-box;
        }
        .box-card{
            display: block;
            width: 250px;
            height: 150px;
            background-color: green;
            border-radius: 10px;
            position: relative;
        }

        .k-mai{
            position: absolute;
            top: 0;
            right: 0;
            background-color: red;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: yellow;
            font-size: 1.25rem;
            border-top-right-radius: 10px;
            border-bottom-left-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>Định vị phần tử</h1>
    <hr>
    <div class="box-card">
        <span class="k-mai">50%</span>
    </div>
</body>
</html>
