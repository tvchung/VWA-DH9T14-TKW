<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tích hợp Font + Typography chuẩn web </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<style>
    :root { 
        --font-main: "Inter", system-ui, sans-serif; 
    }
    body{
        font-family: var(--font-main);
    }
    h1,h2,h3,h4,h5,h6{
        font-weight: 700;
    }
    h1{
        font-family: var(--font-main);
        font-size: 2.5rem;
        color: green;
    }
</style>
</head>
<body>
    <h1>Tích hợp Font + Typography chuẩn web</h1>
    <hr/>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Sapiente, quos? Tempora provident modi nesciunt voluptates totam voluptatibus nobis veniam quis dolor laudantium dolorem porro dolorum repellendus vitae, unde numquam quisquam!
    </p>
</body>
</html>
