<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo header</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>
    <header class="site-header">
        <div class="container header-container">
            <!-- logo -->
            <a href="" class="logo">
                <img src="images/logo.png" alt="Devmaster"/>
            </a>
            <!-- Title -->
            <div class="header-title">
                <h1 class="header-title__heading">Devmaster - Học lập trình để đi làm</h1>

            </div>

            <!-- Contact -->
            <div class="header-contact">
                <a class="contact-item" href="tel:0978611889">
                    <span class="icon" aria-hidden="true">📞</span>
                    <span class="contact-text">
                        <small>Hotline</small>
                        <strong>0978 611 889</strong>
                    </span>
                </a>
                <a class="contact-item" href="mailto:chungtrinhj@gmail.com">
                    <span class="icon" aria-hidden="true">📧</span>
                    <span class="contact-text">
                        <small>Email</small>
                        <strong>chungtrinhj@gmail.com</strong>
                    </span>
                </a>
            </div>
        </div>
    </header>
</body>
</html>
