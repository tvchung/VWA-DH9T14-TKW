<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hàm alert(), confirm() , prompt()</title>
</head>
<body>
    <h1>Hàm alert(), confirm() , prompt()</h1>
    <script>
        // Hàm alert() hiển thị một cửa sổ thông báo với một tin nhắn và một nút "OK"
        alert('Xin chào, đây là một thông báo!');

        // Hàm confirm() hiển thị một cửa sổ xác nhận với một tin nhắn và hai nút "OK" và "Cancel"
        let result = confirm('Bạn có muốn tiếp tục không?');
        console.log('Kết quả:', result);
        alert('Bạn đã chọn: ' + (result ? 'OK' : 'Cancel'));

        // Hàm prompt() hiển thị một cửa sổ nhập liệu với một tin nhắn và một ô nhập liệu
        let name = prompt('Vui lòng nhập tên của bạn:');
        console.log('Tên bạn đã nhập:', name);
        alert
    </script>

</body>
</html>
