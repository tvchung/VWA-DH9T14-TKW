<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sử dụng DOM trong JavaScript - Kiểm tra / tính toán trên form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .err {
            color: red;
        }   
        form{
            width: 300px;
            margin: 0 auto;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            background-color: #fff;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
            border-radius: 999px;
            border: 1px solid green;
        }
        .button {
            display: flex;
            justify-content: center;
        }
        .button button {
            margin: 5px;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            color: yellow;
            background-color: green;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Thực hiện các phép tính trên form thông qua DOM</h1>
    <hr>
    <form id="calculator">
        <div>
            <input type="number" id="num1" name="num1" placeholder="Số thứ nhất:">
            <span id="error1" class="err"></span>
        </div>
      
        <div>
            <input type="number" id="num2" name="num2" placeholder="Số thứ hai:">
            <span id="error2" class="err"></span>
        </div>
        <div class="button">
            <button onclick="return calculator('+');">+</button>
            <button onclick="return calculator('-');">-</button>
            <button onclick="return calculator('*');">*</button>
            <button onclick="return calculator('/');">/</button>
            <button onclick="return calculator('%');">%</button>
        </div>
        <div>
            <input type="text" id="result" name="result" placeholder="Kết quả:" readonly>
        </div>
    </form>

    <script>
        const check = ()=>{
            const num1 = document.getElementById('num1');
            const num2 = document.getElementById('num2');
            const error1 = document.getElementById('error1');
            const error2 = document.getElementById('error2');
            let isValid = true;

            if(num1.value === ''){
                error1.textContent = 'Vui lòng nhập số thứ nhất';
                isValid = false;
            } else {
                error1.textContent = '';
            }

            if(num2.value === ''){
                error2.textContent = 'Vui lòng nhập số thứ hai';
                isValid = false;
            } else {
                error2.textContent = '';
            }

            return isValid;
        }
        const calculator = (pt)=>{
            if(check()==false) return false;
                const num1 = parseFloat(document.getElementById('num1').value);
                const num2 = parseFloat(document.getElementById('num2').value);
                const result = document.getElementById('result');
                let res;
    
                switch(pt){
                    case '+':
                        res = num1 + num2;
                        break;
                    case '-':
                        res = num1 - num2;
                        break;
                    case '*':
                        res = num1 * num2;
                        break;
                    case '/':
                        res = num1 / num2;
                        break;
                    case '%':
                        res = num1 % num2;
                        break;
                    default:
                        res = 'Phép tính không hợp lệ';
                }
                result.value = res;

            return false;
        }
    </script>
</body>
</html>
